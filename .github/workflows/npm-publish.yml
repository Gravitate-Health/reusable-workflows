name: "Build, Test and Publish NPM Package"

# Reusable workflow that builds, tests and publishes an NPM package to npmjs.com
# when triggered by a semver tag (vX.Y.Z).
#
# Required secret (org or repo level): NPM_TOKEN
#   → An NPM automation token with publish rights. Must be accessible by the
#     calling workflow, typically via `secrets: inherit` + an org-level secret.

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version to use (e.g. '20', '22')"
        required: false
        default: "20"
        type: string
      test_script:
        description: "npm script name to run for testing (e.g. 'test'). Set to '' to skip."
        required: false
        default: "test"
        type: string
      build_script:
        description: "npm script name to run for building (e.g. 'build'). Set to '' to skip."
        required: false
        default: "build"
        type: string
      access:
        description: "NPM publish access level: 'public' or 'restricted' (scoped packages)"
        required: false
        default: "public"
        type: string
      registry_url:
        description: "NPM registry URL"
        required: false
        default: "https://registry.npmjs.org"
        type: string
      sync_version:
        description: "Sync package.json version to the git tag version before publishing"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false   # Never cancel an in-flight publish

jobs:
  build-test-publish:
    name: Build, Test and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Validates that the triggering ref is a strict semver tag (vX.Y.Z)
      # and exports a clean `version` output (e.g. "1.2.3") for later steps.
      - name: Validate and extract semver tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '$TAG' is not a valid semver tag (expected vX.Y.Z). Aborting."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Releasing version: $VERSION  (tag: $TAG)"

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.registry_url }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Updates package.json version to exactly match the pushed tag.
      # --no-git-tag-version: do not create a commit or tag (we already have the tag).
      # --allow-same-version:  succeed even if package.json is already at this version.
      - name: Sync package.json version to tag
        if: ${{ inputs.sync_version }}
        run: |
          npm version "${{ steps.version.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version
          echo "✅ package.json version set to ${{ steps.version.outputs.version }}"

      - name: Run tests
        if: ${{ inputs.test_script != '' }}
        run: npm run ${{ inputs.test_script }}

      - name: Build
        if: ${{ inputs.build_script != '' }}
        run: npm run ${{ inputs.build_script }}

      # NODE_AUTH_TOKEN is consumed by the .npmrc written by actions/setup-node
      # when registry-url is provided. It maps to the _authToken field.
      - name: Publish to NPM
        run: npm publish --access ${{ inputs.access }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
